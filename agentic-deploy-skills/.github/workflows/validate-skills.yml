name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Run structural validation
        run: python scripts/validate_skills.py sagemaker-skills

      # If you want stricter behavior (e.g. failing on warnings), add:
      #   --fail-on-warnings
      # to the command above once we add that flag. For now warnings are
      # informational only.
